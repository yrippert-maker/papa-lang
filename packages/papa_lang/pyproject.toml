[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "papa-lang"
version = "0.2.0"
description = "The AI-native language: swarm agents + HRS anti-hallucination"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "papa-guard>=0.1.0",
    "pydantic>=2.0",
    "httpx>=0.25",
]
keywords = ["ai", "llm", "swarm", "hallucination", "orchestrator", "hrs"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
]

[project.scripts]
papa = "papa_lang.compiler.cli:main"

[project.optional-dependencies]
presidio = ["presidio-analyzer>=2.2.0", "presidio-anonymizer>=2.2.0"]
otel = ["opentelemetry-sdk>=1.20.0", "opentelemetry-exporter-otlp>=1.20.0"]
all = ["papa-lang[presidio]", "papa-lang[otel]"]

[project.urls]
Homepage = "https://github.com/papa-ecosystem/papa-lang"
Repository = "https://github.com/papa-ecosystem/papa-lang"

[tool.setuptools.packages.find]
where = ["."]
include = ["papa_lang*"]
