[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "papa-guard"
version = "0.1.0"
description = "AI safety middleware: PII filter, injection guard, cost tracker"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = ["pydantic>=2.0"]
keywords = ["ai", "safety", "pii", "llm", "guard", "hallucination", "russian"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
]

[project.urls]
Homepage = "https://github.com/papa-ecosystem/papa-lang"
Repository = "https://github.com/papa-ecosystem/papa-lang"
Documentation = "https://papa-lang.dev/docs/guard"
"Bug Tracker" = "https://github.com/papa-ecosystem/papa-lang/issues"

[tool.setuptools.packages.find]
where = ["."]
include = ["papa_guard*"]
