[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "papa-rag"
version = "0.1.0"
description = "Hybrid RAG pipeline: semantic + keyword + RRF reranking"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "papa-lang>=0.1.0",
    "chromadb>=0.4",
    "pydantic>=2.0",
]
keywords = ["ai", "rag", "retrieval", "chromadb", "embeddings"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "License :: OSI Approved :: MIT License",
]

[project.urls]
Homepage = "https://github.com/papa-ecosystem/papa-lang"
Repository = "https://github.com/papa-ecosystem/papa-lang"

[tool.setuptools.packages.find]
where = ["."]
include = ["papa_rag*"]
